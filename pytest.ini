[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 将 src 目录加入 pythonpath，防止 CI 找不到本地包
pythonpath = src

# 默认启用 coverage 和简短的回溯
addopts = -v --tb=short --cov=src --cov-report=term-missing --cov-report=html

# 环境变量配置，确保测试时使用测试库而不是生产库
env =
    TESTING=True

markers =
    e2e: end-to-end smoke tests
